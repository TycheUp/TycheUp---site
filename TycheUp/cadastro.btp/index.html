<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet" href="cadastro.css">
    <title>Tyche Up</title>
</head>
<body>
   <div class="bg">
    <div class="main-card">

      <!-- ESQUERDA (CADASTRO) -->
      <div class="left">
        <div class="form-card">
          <h1>TYCHE<span>UP</span></h1>

          <div class="tabs">
            <span>Login</span>
            <span class="active">Cadastre-se</span>
          </div>

          <input type="text" placeholder="NOME">
          <input type="number" placeholder="IDADE">
          <input type="email" placeholder="EMAIL">

          <div class="password">
            <input type="password" placeholder="SENHA">
          </div>

          <button>cadastre-se</button>

          <p class="footer">© 2025 TycheUp. Todos os direitos reservados.</p>
        </div>
      </div>

      <!-- DIREITA (TEXTO + IMAGEM) -->
      <div class="right">
        <h2>O MILAGRE PERSONALIZADO<br>PARA SEU DINHEIRO.</h2>
        <img src="imgtyche.png" alt="Ilustração financeira">
      </div>

    </div>
  </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
